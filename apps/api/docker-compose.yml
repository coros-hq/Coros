services: 
  postgres:
    image: postgres:16-alpine
    container_name: coros-db
    restart: unless-stopped
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-coros_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-coros-db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coros-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-coros_redis_secret}
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli",  "--pass", "${REDIS_PASSWORD:-coros_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: