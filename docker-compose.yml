services:
  postgres:
    image: postgres:16-alpine
    container_name: coros_postgres
    restart: unless-stopped
    env_file:
      - docker.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-coros} -d ${POSTGRES_DB:-coros_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coros_network

  redis:
    image: redis:7-alpine
    container_name: coros_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coros_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: coros_api
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coros_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Passed at build time so Vite can inline the API URL (Nest global prefix is `v1/api`)
        VITE_COROS_API_ORIGIN: ${VITE_COROS_API_ORIGIN:-http://localhost:3000/v1/api}
    container_name: coros_web
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - '4200:4200'
    depends_on:
      - api
    networks:
      - coros_network

volumes:
  postgres_data:
  redis_data:

networks:
  coros_network:
    driver: bridge